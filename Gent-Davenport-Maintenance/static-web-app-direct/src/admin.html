<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davenport Feedback Review — Admin</title>
    <style>
        :root {
            --gent-blue: #00528A;
            --gent-blue-dark: #003d66;
            --gent-orange: #F3802B;
            --gent-orange-light: #fde8d9;
            --aidan-light-green: #E1EFF2;
            --bg-page: #f0f0f0;
            --text-primary: #191919;
            --border-light: #d0d0d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, 'Segoe UI', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            font-size: 16px;
        }

        header {
            background: var(--gent-blue);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 { font-size: 22px; }
        header .subtitle { font-size: 14px; opacity: 0.85; }
        header a {
            margin-left: auto;
            color: white;
            font-size: 14px;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 6px;
        }
        header a:hover { background: var(--gent-blue-dark); }

        .controls {
            display: flex;
            gap: 1rem;
            padding: 1.25rem 2rem;
            background: white;
            border-bottom: 1px solid var(--border-light);
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .controls label { font-size: 14px; color: #555; display: block; margin-bottom: 4px; }

        .controls select, .controls input[type="date"] {
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            font-size: 15px;
            min-height: 40px;
        }
        .controls select:focus, .controls input:focus { outline: none; border-color: var(--gent-orange); }

        .load-btn {
            padding: 0.5rem 1.5rem;
            background: var(--gent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            min-height: 40px;
        }
        .load-btn:hover { background: var(--gent-blue-dark); }

        .stats-bar {
            padding: 0.75rem 2rem;
            font-size: 14px;
            color: #555;
            background: var(--aidan-light-green);
            border-bottom: 1px solid var(--border-light);
        }

        .content { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
            font-size: 18px;
        }

        /* Feedback cards */
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.25rem;
            background: #f8f8f8;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .badge-flagged  { background: #fff3cd; color: #7a5000; }
        .badge-thumbs_up   { background: #d4edda; color: #1a5c2a; }
        .badge-thumbs_down { background: #ffe0e0; color: #8b0000; }

        .card-meta { font-size: 13px; color: #777; }
        .card-meta strong { color: var(--text-primary); }

        .card-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

        .field-label {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .question-box {
            background: var(--gent-blue);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 16px;
        }

        .response-box {
            background: var(--aidan-light-green);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .response-box.expanded { max-height: none; }

        /* Markdown content inside response cards */
        .response-box p { margin: 0.4rem 0; }
        .response-box ol, .response-box ul { margin: 0.4rem 0; padding-left: 1.5rem; }
        .response-box li { margin: 0.2rem 0; }
        .response-box code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-size: 14px; }
        .response-box a { word-break: break-word; }

        .notes-box {
            background: #fff3cd;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 15px;
            font-style: italic;
            border-left: 4px solid var(--gent-orange);
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--border-light);
            background: #fafafa;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.4rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }
        .action-btn:hover { border-color: var(--gent-blue); background: var(--aidan-light-green); }
        .action-btn.danger { color: #c00; }
        .action-btn.danger:hover { border-color: #c00; background: #ffe0e0; }

        .edit-initials-btn {
            padding: 2px 6px;
            border: 1px solid transparent;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            color: #888;
            font-size: 12px;
        }
        .edit-initials-btn:hover { border-color: var(--gent-blue); color: var(--gent-blue); background: var(--aidan-light-green); }

        /* Conversation history panel — shows full thread context */
        .convo-panel {
            background: #f5f5f5;
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.25rem;
        }
        .convo-panel .convo-turn {
            margin-bottom: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: white;
            border-radius: 6px;
            border-left: 3px solid var(--border-light);
            font-size: 14px;
        }
        .convo-panel .convo-turn.current-turn {
            border-left-color: var(--gent-orange);
            background: var(--gent-orange-light);
        }
        .convo-panel .turn-label {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }
        .convo-panel .turn-q { color: var(--gent-blue); font-weight: 600; margin-bottom: 0.25rem; }
        .convo-panel .turn-r { color: #333; line-height: 1.5; }
        .convo-panel .turn-r p { margin: 0.2rem 0; }
        .convo-panel .turn-r ol, .convo-panel .turn-r ul { margin: 0.2rem 0; padding-left: 1.25rem; }
        .convo-panel .turn-r a { word-break: break-word; }

        /* Expand/collapse all toggle */
        .toggle-all-btn {
            padding: 0.35rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: white;
            margin-bottom: 1rem;
        }
        .toggle-all-btn:hover { border-color: var(--gent-blue); background: var(--aidan-light-green); }

        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #ddd;
            border-top-color: var(--gent-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 2rem auto;
            display: block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        a { color: var(--gent-orange); }
        a:hover { color: var(--gent-blue); }

        /* User management section */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gent-blue);
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--gent-orange);
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .users-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #f8f8f8;
            border-bottom: 2px solid var(--border-light);
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .users-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .users-table tr:hover td { background: #f8f9fa; }
        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .role-admin { background: var(--gent-orange-light); color: #7a5000; }
        .role-user { background: #e8f5e9; color: #2e7d32; }
        .small-btn {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            background: white;
            margin-right: 0.4rem;
        }
        .small-btn:hover { border-color: var(--gent-blue); background: var(--aidan-light-green); }
        .small-btn.danger:hover { border-color: #c00; background: #ffe0e0; }
        .add-user-form {
            display: none;
            background: white;
            padding: 1.25rem;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }
        .add-user-form.visible { display: block; }
        .form-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 0.75rem;
        }
        .form-row label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        .form-row input, .form-row select {
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            font-size: 14px;
            min-height: 38px;
        }
        .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--gent-orange); }
        .user-display-name { font-size: 13px; color: white; opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>&#128203; Admin Panel</h1>
            <div class="subtitle">Davenport Support — Feedback &amp; Users</div>
        </div>
        <span id="user-display-name" class="user-display-name"></span>
        <a href="index.html">&#8592; Back to Chat</a>
        <button onclick="signOut()" style="padding:0.4rem 0.9rem;background:transparent;color:white;border:2px solid rgba(255,255,255,0.4);border-radius:6px;font-size:13px;cursor:pointer;">Sign Out</button>
    </header>

    <div class="controls">
        <div>
            <label for="filter-rating">Rating</label>
            <select id="filter-rating">
                <option value="" selected>All feedback</option>
                <option value="flagged">&#9873; Flagged only</option>
                <option value="thumbs_down">&#128078; Thumbs down</option>
                <option value="thumbs_up">&#128077; Thumbs up</option>
            </select>
        </div>
        <div>
            <label for="filter-start">From</label>
            <input type="date" id="filter-start" onkeydown="if(event.key==='Enter')loadFeedback()">
        </div>
        <div>
            <label for="filter-end">To</label>
            <input type="date" id="filter-end" onkeydown="if(event.key==='Enter')loadFeedback()">
        </div>
        <div>
            <label style="display:flex;align-items:center;gap:0.4rem;margin-bottom:4px;font-size:14px;color:#555;">
                <input type="checkbox" id="filter-all-time" style="margin:0"> Show all time
            </label>
            <div style="font-size:11px;color:#888;max-width:160px">Default window is last 30 days when dates are blank.</div>
        </div>
        <button class="load-btn" onclick="loadFeedback()">Load</button>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none"></div>

    <div class="content">
        <!-- User Management -->
        <div class="section-title">User Management</div>
        <table class="users-table" id="users-table">
            <thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody id="users-tbody"><tr><td colspan="4" style="text-align:center;color:#888">Loading...</td></tr></tbody>
        </table>
        <button class="load-btn" style="margin-top:0.75rem" onclick="toggleAddForm()">+ Add User</button>
        <div class="add-user-form" id="add-user-form">
            <div class="form-row">
                <div><label for="new-username">Username</label><input id="new-username" placeholder="e.g. dmiller"></div>
                <div><label for="new-display">Display Name</label><input id="new-display" placeholder="e.g. Dave M."></div>
                <div><label for="new-password">Password</label><input id="new-password" type="password" placeholder="Temporary password"></div>
                <div><label for="new-role">Role</label>
                    <select id="new-role"><option value="user">User</option><option value="admin">Admin</option></select>
                </div>
                <button class="load-btn" onclick="createUser()">Create</button>
            </div>
            <div id="add-user-msg" style="font-size:13px;margin-top:0.5rem"></div>
        </div>

        <!-- Feedback Review -->
        <div class="section-title" style="margin-top:2rem">Feedback Review</div>
        <div id="feedback-list">
            <div class="empty-state">Select filters above and click Load to see feedback.</div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://func-davenport-api.azurewebsites.net/api';

        // Auth gate — redirect to login if no token
        if (!sessionStorage.getItem('auth_token')) {
            window.location.replace('login.html');
        }

        // Decode JWT payload client-side (no verification — server validates)
        function getTokenClaims() {
            const token = sessionStorage.getItem('auth_token');
            if (!token) return {};
            try {
                const payload = token.split('.')[1];
                return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
            } catch { return {}; }
        }

        const claims = getTokenClaims();
        const userDisplayName = claims.display_name || claims.sub || 'User';
        document.getElementById('user-display-name').textContent = userDisplayName;

        function authHeaders() {
            return { 'Authorization': 'Bearer ' + (sessionStorage.getItem('auth_token') || '') };
        }

        function handleAuthError(resp) {
            if (resp.status === 401) {
                sessionStorage.removeItem('auth_token');
                window.location.replace('login.html');
                return true;
            }
            return false;
        }

        function signOut() {
            sessionStorage.removeItem('auth_token');
            window.location.replace('login.html');
        }

        // ---- User Management ----
        async function loadUsers() {
            try {
                const resp = await fetch(API_BASE + '/manage-users', { headers: authHeaders() });
                if (handleAuthError(resp)) return;
                const users = await resp.json();
                const tbody = document.getElementById('users-tbody');
                if (!Array.isArray(users) || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888">No users found</td></tr>';
                    return;
                }
                tbody.innerHTML = users.map(u => {
                    const roleClass = u.role === 'admin' ? 'role-admin' : 'role-user';
                    const isSelf = u.username === claims.sub;
                    return '<tr>' +
                        '<td><strong>' + escHtml(u.username) + '</strong>' + (isSelf ? ' (you)' : '') + '</td>' +
                        '<td>' + escHtml(u.display_name) + '</td>' +
                        '<td><span class="role-badge ' + roleClass + '">' + u.role + '</span></td>' +
                        '<td>' +
                        '<button class="small-btn" onclick="resetPassword(\'' + escHtml(u.username) + '\')">Reset PW</button>' +
                        (isSelf ? '' : '<button class="small-btn danger" onclick="deleteUser(\'' + escHtml(u.username) + '\')">Delete</button>') +
                        '</td></tr>';
                }).join('');
            } catch (err) {
                document.getElementById('users-tbody').innerHTML =
                    '<tr><td colspan="4" style="color:#c00">Failed to load users: ' + err.message + '</td></tr>';
            }
        }

        function toggleAddForm() {
            document.getElementById('add-user-form').classList.toggle('visible');
            document.getElementById('add-user-msg').textContent = '';
        }

        async function createUser() {
            const msgEl = document.getElementById('add-user-msg');
            const username = document.getElementById('new-username').value.trim();
            const display_name = document.getElementById('new-display').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!username || !password) {
                msgEl.textContent = 'Username and password are required.';
                msgEl.style.color = '#c00';
                return;
            }

            msgEl.textContent = 'Creating...';
            msgEl.style.color = '#555';

            try {
                const resp = await fetch(API_BASE + '/manage-users', {
                    method: 'POST',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, display_name, password, role })
                });
                if (handleAuthError(resp)) return;
                const data = await resp.json();

                if (resp.ok) {
                    msgEl.textContent = 'User ' + username + ' created!';
                    msgEl.style.color = '#2e7d32';
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-display').value = '';
                    document.getElementById('new-password').value = '';
                    loadUsers(); // refresh table
                } else {
                    msgEl.textContent = data.error || 'Failed to create user';
                    msgEl.style.color = '#c00';
                }
            } catch (err) {
                msgEl.textContent = 'Error: ' + err.message;
                msgEl.style.color = '#c00';
            }
        }

        async function deleteUser(username) {
            if (!confirm('Delete user "' + username + '"? This cannot be undone.')) return;
            try {
                const resp = await fetch(API_BASE + '/manage-users?user=' + encodeURIComponent(username), {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (handleAuthError(resp)) return;
                if (resp.ok) {
                    loadUsers();
                } else {
                    const data = await resp.json();
                    alert(data.error || 'Failed to delete user');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function resetPassword(username) {
            const newPw = prompt('Enter new password for ' + username + ':');
            if (!newPw) return;
            try {
                const resp = await fetch(API_BASE + '/manage-users?user=' + encodeURIComponent(username), {
                    method: 'PUT',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPw })
                });
                if (handleAuthError(resp)) return;
                if (resp.ok) {
                    alert('Password updated for ' + username);
                } else {
                    const data = await resp.json();
                    alert(data.error || 'Failed to reset password');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // Date filter defaults to blank — user picks a date to narrow results

        const RATING_LABELS = {
            flagged:     '&#9873; Flagged',
            thumbs_up:   '&#128077; Helpful',
            thumbs_down: '&#128078; Not helpful'
        };

        async function loadFeedback() {
            const rating  = document.getElementById('filter-rating').value;
            const start   = document.getElementById('filter-start').value;
            const end     = document.getElementById('filter-end').value;
            const allTime = document.getElementById('filter-all-time').checked;

            const listEl  = document.getElementById('feedback-list');
            const statsEl = document.getElementById('stats-bar');
            listEl.innerHTML = '<div class="spinner"></div>';
            statsEl.style.display = 'none';

            const params = new URLSearchParams();
            if (rating)  params.set('rating', rating);
            if (start)   params.set('start', start);
            if (end)     params.set('end', end);
            if (allTime) params.set('all', 'true');

            try {
                const res  = await fetch(`${API_BASE}/feedback?${params}`, {
                    headers: authHeaders()
                });
                if (handleAuthError(res)) return;
                const data = await res.json();

                if (!Array.isArray(data) || data.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">No feedback found for the selected filters.</div>';
                    return;
                }

                // Backend sorts newest first; keep a client-side fallback sort by timestamp/date desc
                data.sort((a, b) => (b.timestamp || b.date || '').localeCompare(a.timestamp || a.date || ''));

                // Stats breakdown by rating type
                const counts = { flagged: 0, thumbs_down: 0, thumbs_up: 0 };
                data.forEach(d => { if (counts[d.rating] !== undefined) counts[d.rating]++; });
                const parts = [];
                if (counts.flagged) parts.push(`${counts.flagged} flagged`);
                if (counts.thumbs_down) parts.push(`${counts.thumbs_down} thumbs down`);
                if (counts.thumbs_up) parts.push(`${counts.thumbs_up} thumbs up`);
                statsEl.textContent = `${data.length} record${data.length !== 1 ? 's' : ''}` +
                    (parts.length ? ` \u2014 ${parts.join(', ')}` : '');
                statsEl.style.display = 'block';

                // Store data for expand/collapse all
                window._feedbackData = data;

                listEl.innerHTML =
                    `<button class="toggle-all-btn" onclick="toggleAllResponses()">Expand All / Collapse All</button>` +
                    data.map((item, i) => buildCard(item, i)).join('');

            } catch (err) {
                listEl.innerHTML = `<div class="empty-state" style="color:#c00">Error loading feedback: ${err.message}</div>`;
            }
        }

        function buildCard(item, i) {
            const ratingClass = `badge-${item.rating}`;
            const ratingLabel = RATING_LABELS[item.rating] || item.rating;
            // Prefer the exact submit timestamp from Table Storage; fall back to the PartitionKey date
            let dateStr = item.date || '';
            if (item.timestamp) {
                try {
                    const d = new Date(item.timestamp);
                    if (!isNaN(d)) {
                        dateStr = d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                    }
                } catch {}
            }
            const initialsDisplay = item.initials ? `<strong>${escHtml(item.initials)}</strong>` : '<em style="color:#888">no initials</em>';
            const who = `by <span id="initials-${i}">${initialsDisplay}</span> <button class="edit-initials-btn" onclick="editInitials(${i}, '${item.date}', '${escHtml(item.id)}')" title="Edit initials">&#9998;</button>`;
            const user = item.username ? ` (${escHtml(item.username)})` : '';
            const mode = item.reasoning_level ? ` &middot; ${item.reasoning_level}` : '';

            const hasNotes = item.notes && item.notes.trim();
            const notesHtml = hasNotes
                ? `<div><div class="field-label">Notes from technician</div>
                   <div class="notes-box">${escHtml(item.notes)}</div></div>`
                : '';

            // Check if conversation history has prior turns
            let history = [];
            try { history = JSON.parse(item.conversation_history || '[]'); } catch {}
            const hasHistory = Array.isArray(history) && history.length > 0;
            const convoBtn = hasHistory
                ? `<button class="action-btn" onclick="toggleConversation(${i})">&#128196; View Conversation (${history.length + 1} turns)</button>`
                : '';

            return `
                <div class="card" id="card-${i}">
                    <div class="card-header">
                        <span class="rating-badge ${ratingClass}">${ratingLabel}</span>
                        <span class="card-meta">${dateStr} &middot; ${who}${user}${mode}</span>
                    </div>
                    <div class="card-body">
                        <div>
                            <div class="field-label">Question</div>
                            <div class="question-box">${escHtml(item.message || '')}</div>
                        </div>
                        <div>
                            <div class="field-label">Response <small style="font-weight:normal;text-transform:none;">(click to expand)</small></div>
                            <div class="response-box" id="resp-${i}"
                                 onclick="this.classList.toggle('expanded')"
                                 style="cursor:pointer">${formatMarkdown(item.response || '')}</div>
                        </div>
                        ${notesHtml}
                    </div>
                    <div class="card-actions">
                        ${convoBtn}
                    </div>
                    <div class="convo-panel" id="convo-${i}" style="display:none"></div>
                </div>`;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Render markdown in responses — same logic as chat page (index.html)
        // Escapes HTML FIRST for XSS safety, then converts markdown to HTML
        function formatMarkdown(text) {
            text = escHtml(text);
            // Strip citation annotation markers like 【6:1†source】
            text = text.replace(/【[^】]*】/g, '');
            // Markdown links → clickable anchors
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            // Remove bare URLs in parentheses that weren't linked
            text = text.replace(/\(https?:\/\/[^)]+\)/g, '');
            // Bold and inline code
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Split into paragraph blocks on double newline
            const blocks = text.split(/\n\n+/);
            const html = blocks.map(block => {
                block = block.trim();
                if (!block) return '';

                // Numbered list: block starts with "1." or "1)"
                if (/^\d{1,2}[).]\s/.test(block)) {
                    const items = block.split(/\n(?=\d{1,2}[).]\s)/);
                    if (items.length > 1) {
                        const lis = items.map(item => {
                            const cleaned = item.replace(/^\d{1,2}[).]\s*/, '').trim();
                            return cleaned ? '<li>' + cleaned + '</li>' : '';
                        }).filter(x => x).join('');
                        return '<ol>' + lis + '</ol>';
                    }
                }

                // Bullet list: lines starting with "- "
                if (/^- /m.test(block)) {
                    const lines = block.split('\n');
                    let result = '';
                    let inList = false;
                    for (const line of lines) {
                        if (/^- /.test(line)) {
                            if (!inList) { result += '<ul>'; inList = true; }
                            result += '<li>' + line.replace(/^- /, '').trim() + '</li>';
                        } else {
                            if (inList) { result += '</ul>'; inList = false; }
                            const trimmed = line.trim();
                            if (trimmed) result += '<p>' + trimmed + '</p>';
                        }
                    }
                    if (inList) result += '</ul>';
                    return result;
                }

                // Plain paragraph — single newlines become <br>
                return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
            });

            return html.join('');
        }

        // Toggle conversation history panel for a card
        function toggleConversation(i) {
            const panel = document.getElementById(`convo-${i}`);
            if (!panel) return;

            // If already rendered, just toggle visibility
            if (panel.innerHTML) {
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
                return;
            }

            // First open — render the conversation thread
            const item = window._feedbackData[i];
            let history = [];
            try { history = JSON.parse(item.conversation_history || '[]'); } catch {}

            let html = '';
            // Prior turns
            history.forEach((turn, idx) => {
                html += `<div class="convo-turn">
                    <div class="turn-label">Turn ${idx + 1}</div>
                    <div class="turn-q">${escHtml(turn.message || '')}</div>
                    <div class="turn-r">${formatMarkdown(turn.response || '')}</div>
                </div>`;
            });
            // Current (rated) turn — highlighted
            html += `<div class="convo-turn current-turn">
                <div class="turn-label">Turn ${history.length + 1} (rated)</div>
                <div class="turn-q">${escHtml(item.message || '')}</div>
                <div class="turn-r">${formatMarkdown(item.response || '')}</div>
            </div>`;

            panel.innerHTML = html;
            panel.style.display = 'block';
        }

        // Expand or collapse all response boxes
        function toggleAllResponses() {
            const boxes = document.querySelectorAll('.response-box');
            // If any are collapsed, expand all; otherwise collapse all
            const anyCollapsed = Array.from(boxes).some(b => !b.classList.contains('expanded'));
            boxes.forEach(b => {
                if (anyCollapsed) b.classList.add('expanded');
                else b.classList.remove('expanded');
            });
        }

        function copyToClipboard(question, response) {
            const text = `Q: ${question}\n\nA: ${response}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard — paste into your knowledge gap doc.');
            });
        }

        async function editInitials(i, partitionKey, rowKey) {
            const current = document.getElementById(`initials-${i}`);
            const currentText = current.textContent.trim() === 'no initials' ? '' : current.textContent.trim();
            const newInitials = prompt('Enter initials:', currentText);
            if (newInitials === null) return;  // cancelled
            const trimmed = newInitials.trim();
            if (!trimmed) {
                alert('Initials cannot be empty.');
                return;
            }
            try {
                const resp = await fetch(`${API_BASE}/feedback/${encodeURIComponent(partitionKey)}/${encodeURIComponent(rowKey)}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionStorage.getItem('auth_token')}`
                    },
                    body: JSON.stringify({ initials: trimmed })
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    alert(`Failed to update: ${err.error || resp.status}`);
                    return;
                }
                current.innerHTML = `<strong>${escHtml(trimmed)}</strong>`;
            } catch (e) {
                alert(`Failed to update: ${e.message}`);
            }
        }

        // Auto-load on page open
        loadUsers();
        loadFeedback();
    </script>
</body>
</html>
